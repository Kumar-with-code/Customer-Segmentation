<!DOCTYPE html>
<html>
<head>
    <title>Customer Segmentation</title>
    <link href="{{ url_for('static', filename='output.css') }}" rel="stylesheet">
</head>
<body class="bg-blue-100 flex justify-center items-center min-h-screen">

<div class="container mb-4 bg-white p-8 rounded-lg shadow-2xl max-w-sm w-full">
    <h1 class=" block p-2 font-bold text-center mb-4">Customer Segmentation</h1>

    <form action="/predict" method="post" class="">
        <label class="block mb-2 text-sm text-center font-bold" >Annual Income $</label>
        <input class="px-4 py-2 mb-4 w-full rounded-lg  bg-blue-50 text-gray-800 border border-blue-200
                        focus:outline-none focus:ring-2 focus:ring-blue-200 shadow-lg font-bold" type="number" name="income" placeholder="e.g. U S D" required>

        <label class="block mb-2 text-sm text-center font-medium text-gray-900">Spending Score </label>
        <input class="px-4 py-2 mb-4 w-full bg-blue-50 text-gray-500 border-blue-200 rounded-lg 
                        focus:outline-none focus:ring-2 focus:ring-blue-200 shadow-lg font-bold" type="number" name="score" placeholder="e.g. [1-100]" required>

        <button class="bg-blue-700 rounded-3xl w-full mt-4 mb-4 py-2 text-white cursor-pointer hover:bg-blue-900" type="submit">Predict</button>
    </form>

    {% if prediction %}
        <div class="result font-bold text-center ">
            <h2>{{ prediction }}</h2>
        </div>
    {% endif %}
</div>

</body>
</html>
